# DEPLOY-SPECIFIC compose for the SharpCall Dokploy host. Do NOT merge into the
# OSS repo's compose — it runs as root and joins Dokploy's swarm overlay, neither
# of which a vanilla `docker compose up` wants. The generic compose lives on the
# personal repo's main.
#
#   docker compose pull && docker compose up -d      # daemon: publishes at each publish hour
#   docker compose run --rm lazyblog sites           # same CLI, any time
#   docker compose logs -f

services:
  lazyblog:
    image: ${LAZYBLOG_IMAGE:-ghcr.io/gurkirat-singh-bit/lazyblog:latest}
    restart: unless-stopped
    # Dokploy clones the bind-mounted sites/ as root; the image's non-root
    # `lazyblog` user then can't create drafts/ or .last_run in the mount. Run as
    # root so the daemon can write. (ponytail: blunt but survives every redeploy;
    # the tidy alternative is an entrypoint that chowns the mount then drops priv,
    # which needs an image rebuild.)
    user: "0:0"
    env_file:
      - path: .env
        required: false
    volumes:
      - ./sites:/app/sites
    # The delivery target (the website) is a swarm service on dokploy-network.
    # Without joining it, the webhook host does not resolve ([Errno -3]).
    networks:
      - dokploy-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  dokploy-network:
    external: true
