name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv sync --frozen

      - name: Lint
        run: uvx ruff check src tests

      - name: Type check
        run: uvx pyright

      - name: Tests
        run: uv run pytest -q

  publish:
    # Never publish a broken image, and never publish from a fork's pull request.
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      # arm64 is emulated. The build only unpacks wheels (PyYAML ships musllinux
      # aarch64, so nothing compiles), which keeps QEMU tolerable.
      # ponytail: if this ever gets slow, split into native amd64 + ubuntu-24.04-arm
      # runners and merge the manifests. Not worth the YAML until it hurts.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          # GHCR demands a lowercase path; repository names do not have to be.
          images: ghcr.io/${{ github.repository_owner }}/lazyblog
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      - id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Prove both architectures actually shipped. One prod server is arm64 and the
      # other is x86; a manifest that quietly lost an arch fails at `docker pull` on
      # the server, which is a rubbish place to find out.
      - name: Verify the manifest serves amd64 + arm64
        run: |
          set -euo pipefail
          image="ghcr.io/${{ github.repository_owner }}/lazyblog@${{ steps.build.outputs.digest }}"
          echo "Inspecting ${image}"
          docker buildx imagetools inspect "${image}" | tee /tmp/manifest.txt
          for want in linux/amd64 linux/arm64; do
            grep -q "$want" /tmp/manifest.txt || { echo "::error::manifest is missing $want"; exit 1; }
            echo "ok: $want present"
          done
